<!DOCTYPE html>
<html>
<head>
<title>RS Gaming Hub</title>
<style>
body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#1e1e1e;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.search{
text-align:center;
padding:20px;
}

.search input{
width:80%;
padding:10px;
border-radius:10px;
border:none;
}

.games{
display:flex;
flex-direction:column;
gap:15px;
padding:15px;
}

.card{
background:#222;
padding:15px;
border-radius:12px;
}

button{
background:#0078ff;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
}
</style>
</head>

<body>

<header>🎮 RS Gaming Hub</header>

<div class="search">
<input type="text" placeholder="Search Games">
</div>

<div class="games">

<div class="card">
<h2>GTA V</h2>
<button>Add To Cart 🛒</button>
</div>

<div class="card">
<h2>Minecraft</h2>
<button>Add To Cart 🛒</button>
</div>

<div class="card">
<h2>Forza Horizon</h2>
<button>Add To Cart 🛒</button>
</div>

</div>

</body>
</html>
